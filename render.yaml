services:
  - type: web
    name: rsm-backend
    runtime: docker
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rsm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        # Will be updated automatically once frontend URL is known; safe default.
        value: '*'

  - type: web
    name: rsm-frontend
    runtime: docker
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: rsm-backend
          property: url

databases:
  - name: rsm-db
    plan: free

